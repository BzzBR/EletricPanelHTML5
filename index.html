<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonTower — Panel Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #04000e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #c { display: block; }

    /* ── Control Bar ──────────────────────────────────────────────────────── */
    #ctrl-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(6, 2, 18, 0.93);
      border: 1px solid rgba(140, 50, 240, 0.2);
      border-radius: 16px;
      padding: 10px 16px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 28px rgba(100, 20, 200, 0.22), 0 1px 4px rgba(0,0,0,0.7);
      user-select: none;
      white-space: nowrap;
    }

    /* section separator */
    .vsep {
      width: 1px;
      height: 38px;
      background: rgba(140, 50, 240, 0.18);
      margin: 0 8px;
      flex-shrink: 0;
    }

    /* section label */
    .sect-lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(150, 100, 240, 0.38);
      margin-right: 4px;
    }

    /* ── Preset Buttons ─────────────────────────────────────────────────── */
    .preset-group { display: flex; gap: 5px; }

    .preset-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(175, 138, 255, 0.6);
      background: rgba(40, 15, 75, 0.5);
      border: 1px solid rgba(130, 50, 230, 0.22);
      border-radius: 8px;
      padding: 7px 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:hover {
      background: rgba(100, 30, 200, 0.4);
      border-color: rgba(170, 80, 255, 0.5);
      color: rgba(210, 170, 255, 0.9);
    }
    .preset-btn.active {
      background: rgba(110, 25, 240, 0.55);
      border-color: rgba(185, 80, 255, 0.7);
      color: #cc88ff;
      box-shadow: 0 0 10px rgba(160, 50, 255, 0.3);
    }

    /* ── Color Swatches ─────────────────────────────────────────────────── */
    .color-group { display: flex; gap: 6px; align-items: center; }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .color-btn:hover  { transform: scale(1.22); border-color: rgba(255,255,255,0.38); }
    .color-btn.active {
      transform: scale(1.28);
      border-color: rgba(255,255,255,0.78);
      box-shadow: 0 0 9px var(--sw-c, #9940ff);
    }

    /* ── Layer Toggles ──────────────────────────────────────────────────── */
    .toggle-group { display: flex; gap: 4px; }

    .ti {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 46px;
    }
    .ti-lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(175, 140, 255, 0.42);
      white-space: nowrap;
    }

    .sw { position: relative; width: 34px; height: 18px; cursor: pointer; display: block; }
    .sw input { opacity: 0; position: absolute; width: 0; height: 0; }
    .sw-tk {
      position: absolute;
      inset: 0;
      background: rgba(32, 10, 60, 0.8);
      border: 1px solid rgba(125, 42, 220, 0.22);
      border-radius: 18px;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .sw-tk::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 2px; top: 2px;
      background: rgba(120, 50, 190, 0.5);
      border-radius: 50%;
      transition: transform 0.15s, background 0.15s;
    }
    .sw input:checked + .sw-tk {
      background: rgba(100, 22, 235, 0.5);
      border-color: rgba(180, 75, 255, 0.6);
      box-shadow: 0 0 7px rgba(155, 45, 255, 0.28);
    }
    .sw input:checked + .sw-tk::before {
      transform: translateX(16px);
      background: #b05cf0;
    }

    /* ── Advanced Panel ──────────────────────────────────────────────────── */
    #adv-panel {
      position: fixed;
      bottom: 82px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      width: 628px;
      background: rgba(6, 2, 18, 0.96);
      border: 1px solid rgba(140, 50, 240, 0.28);
      border-radius: 14px;
      padding: 14px 16px 12px;
      backdrop-filter: blur(20px);
      box-shadow: 0 -4px 32px rgba(100,20,200,0.25), 0 4px 12px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      z-index: 100;
    }
    #adv-panel.open {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    .adv-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .adv-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(180, 130, 255, 0.6);
    }
    .copy-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(160, 100, 255, 0.7);
      background: rgba(80, 20, 160, 0.35);
      border: 1px solid rgba(140, 50, 240, 0.35);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: rgba(110,30,220,0.5); border-color: rgba(180,80,255,0.6); color: #cc88ff; }
    .copy-btn.ok    { color: #88ffcc; border-color: rgba(80,255,160,0.5); background: rgba(20,100,60,0.4); }
    .sliders-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 20px;
      margin-bottom: 10px;
    }
    .sl-row { display: flex; align-items: center; gap: 6px; }
    .sl-lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(160, 120, 255, 0.5);
      width: 62px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .sl-row input[type=range] {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(100, 40, 200, 0.25);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .sl-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #9940ff;
      box-shadow: 0 0 6px rgba(153,64,255,0.7);
      cursor: pointer;
    }
    .sl-row input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #9940ff;
      border: none;
      box-shadow: 0 0 6px rgba(153,64,255,0.7);
    }
    .sl-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 8px;
      font-weight: 700;
      color: rgba(200, 160, 255, 0.7);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
    #copy-box {
      width: 100%;
      height: 44px;
      background: rgba(15, 6, 35, 0.8);
      border: 1px solid rgba(100, 40, 180, 0.25);
      border-radius: 6px;
      color: rgba(180, 150, 255, 0.7);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 6px 8px;
      resize: none;
      outline: none;
    }
    .adv-toggle-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(170, 130, 255, 0.55);
      background: rgba(40, 15, 75, 0.4);
      border: 1px solid rgba(120, 45, 220, 0.2);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .adv-toggle-btn:hover { background: rgba(90,25,180,0.45); border-color: rgba(170,80,255,0.45); color: #bb88ff; }
    .adv-toggle-btn.open  { background: rgba(100,22,235,0.5); border-color: rgba(185,80,255,0.65); color: #cc88ff; box-shadow: 0 0 8px rgba(160,50,255,0.28); }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- ── Advanced Panel ────────────────────────────────────────────────────── -->
<div id="adv-panel">
  <div class="adv-hdr">
    <span class="adv-title">⚙️ Configuração Avançada</span>
    <div style="display:flex;gap:6px">
      <button class="copy-btn" id="snippet-btn" onclick="copySnippet()">SNIPPET</button>
      <button class="copy-btn" id="copy-btn" onclick="copyParams()">COPIAR</button>
    </div>
  </div>
  <div class="sliders-grid" id="sliders-grid"></div>
  <textarea id="copy-box" readonly spellcheck="false"></textarea>
</div>

<div id="ctrl-bar">

  <!-- Presets -->
  <span class="sect-lbl">Preset</span>
  <div class="preset-group">
    <button class="preset-btn" id="p-suave"   onclick="applyPreset('suave')">Suave</button>
    <button class="preset-btn active" id="p-padrao"  onclick="applyPreset('padrao')">Padrão</button>
    <button class="preset-btn" id="p-intenso" onclick="applyPreset('intenso')">Intenso</button>
  </div>

  <div class="vsep"></div>

  <!-- Colors -->
  <span class="sect-lbl">Cor</span>
  <div class="color-group" id="color-group"></div>

  <div class="vsep"></div>

  <!-- Outer border (frame) color -->
  <span class="sect-lbl">Frame</span>
  <div class="color-group" id="outer-color-group"></div>

  <div class="vsep"></div>

  <!-- Layer toggles -->
  <span class="sect-lbl">Layers</span>
  <div class="toggle-group">
    <div class="ti">
      <label class="sw"><input type="checkbox" id="t-bg" checked><span class="sw-tk"></span></label>
      <span class="ti-lbl">BG Glow</span>
    </div>
    <div class="ti">
      <label class="sw"><input type="checkbox" id="t-cn" checked><span class="sw-tk"></span></label>
      <span class="ti-lbl">Corners</span>
    </div>
    <div class="ti">
      <label class="sw"><input type="checkbox" id="t-ou" checked><span class="sw-tk"></span></label>
      <span class="ti-lbl">Frame</span>
    </div>
    <div class="ti">
      <label class="sw"><input type="checkbox" id="t-au" checked><span class="sw-tk"></span></label>
      <span class="ti-lbl">Aura</span>
    </div>
    <div class="ti">
      <label class="sw"><input type="checkbox" id="t-el" checked><span class="sw-tk"></span></label>
      <span class="ti-lbl">Electric</span>
    </div>
  </div>
  <div class="vsep"></div>
  <button class="adv-toggle-btn" id="adv-toggle-btn" onclick="toggleAdv()">⚙ ADV</button>
</div>

<script src="electric-border.js"></script>
<script>
'use strict';
const VERSION = '0.1.0';
// ── Canvas ────────────────────────────────────────────────────────────────────
const C  = document.getElementById('c');
const cx = C.getContext('2d');
const PW = 480, PH = 400;
let W, H, CX, CY, PX, PY;

function resize() {
  C.width = W = window.innerWidth;
  C.height = H = window.innerHeight;
  CX = W / 2; CY = H / 2;
  PX = Math.round(CX - PW / 2); PY = Math.round(CY - PH / 2);
}
resize();
window.addEventListener('resize', resize);

// ── Presets ───────────────────────────────────────────────────────────────────
const PRESETS = {
  suave: {                                           // derivado do padrao: mais suave
    freq: 0.015, octaves: 8,  scale: 20,
    durDy: 12,   durDx: 12,
    auraBlur: 6, auraW: 2.0, coronaW: 1.6, arcW: 0.5, coreW: 0.18,
    pulseSpd: 1.5,
  },
  padrao: {
    freq: 0.018, octaves: 8,  scale: 26,
    durDy: 12,   durDx: 12,
    auraBlur: 12, auraW: 3.2, coronaW: 2.6, arcW: 0.8, coreW: 0.30,
    pulseSpd: 2.2,
  },
  intenso: {                                         // derivado do padrao: mais intenso
    freq: 0.028, octaves: 10, scale: 50,
    durDy: 7,    durDx: 7,
    auraBlur: 18, auraW: 5.0, coronaW: 4.0, arcW: 1.4, coreW: 0.55,
    pulseSpd: 4.0,
  },
};

// ── Colors ────────────────────────────────────────────────────────────────────
const COLORS = [
  { name: 'Violeta',   hue: 270, swatch: '#9940ff' },
  { name: 'Ciano',     hue: 183, swatch: '#00e5f5' },
  { name: 'Rosa',      hue: 300, swatch: '#ff00ee' },
  { name: 'Verde',     hue: 148, swatch: '#00ee80' },
  { name: 'Azul',      hue: 214, swatch: '#1186ff' },
  { name: 'Laranja',   hue: 24,  swatch: '#ff6200' },
  { name: 'Vermelho',  hue: 352, swatch: '#ff1045' },
  { name: 'Dourado',   hue: 52,  swatch: '#e2de00' },
];

// ── ElectricBorder ────────────────────────────────────────────────────────────
const eb = new ElectricBorder({ ...PRESETS.padrao, hue: 270, spinSpd: 1.4 });

// ── Layer toggles ─────────────────────────────────────────────────────────────
const T = { bg: true, cn: true, ou: true, au: true, el: true };
['bg', 'cn', 'ou', 'au', 'el'].forEach(k =>
  document.getElementById('t-' + k).addEventListener('change', e => T[k] = e.target.checked)
);

// ── Slider definitions ────────────────────────────────────────────────────────
const SLIDERS = [
  { key: 'hue',      label: 'Hue',        min: 0,     max: 360,  step: 1,    fmt: v => v + '°'         },
  { key: 'outerHue', label: 'Frame Hue',  min: 0,     max: 360,  step: 1,    fmt: v => v + '°'         },
  { key: 'freq',     label: 'Freq',       min: 0.005, max: 0.12, step: 0.001,fmt: v => (+v).toFixed(3) },
  { key: 'octaves',  label: 'Octaves',  min: 1,     max: 12,   step: 1,    fmt: v => v               },
  { key: 'scale',    label: 'Scale',    min: 2,     max: 80,   step: 1,    fmt: v => v               },
  { key: 'durDy',    label: 'Dur ↕',    min: 1,     max: 20,   step: 0.5,  fmt: v => v + 's'         },
  { key: 'durDx',    label: 'Dur ↔',    min: 1,     max: 20,   step: 0.5,  fmt: v => v + 's'         },
  { key: 'auraBlur', label: 'Aura Blur',min: 0,     max: 30,   step: 1,    fmt: v => v               },
  { key: 'auraW',    label: 'Aura W',   min: 0,     max: 10,   step: 0.1,  fmt: v => (+v).toFixed(1) },
  { key: 'coronaW',  label: 'Corona W', min: 0,     max: 8,    step: 0.1,  fmt: v => (+v).toFixed(1) },
  { key: 'arcW',     label: 'Arc W',    min: 0,     max: 3,    step: 0.05, fmt: v => (+v).toFixed(2) },
  { key: 'coreW',    label: 'Core W',   min: 0,     max: 1.5,  step: 0.05, fmt: v => (+v).toFixed(2) },
  { key: 'pulseSpd', label: 'Pulse',    min: 0,     max: 10,   step: 0.1,  fmt: v => (+v).toFixed(1) },
  { key: 'spinSpd',  label: 'Spin',     min: 0,     max: 4,    step: 0.1,  fmt: v => (+v).toFixed(1) },
];

// ── Copy / paste ──────────────────────────────────────────────────────────────
function updateCopyBox() {
  const p = eb.p;
  const oh = p.outerHue != null ? p.outerHue : p.hue;
  document.getElementById('copy-box').value =
    `new ElectricBorder({\n` +
    `  hue: ${p.hue}, outerHue: ${oh}, freq: ${(+p.freq).toFixed(3)}, octaves: ${p.octaves}, scale: ${p.scale},\n` +
    `  durDy: ${p.durDy}, durDx: ${p.durDx}, auraBlur: ${p.auraBlur},\n` +
    `  auraW: ${(+p.auraW).toFixed(2)}, coronaW: ${(+p.coronaW).toFixed(2)}, arcW: ${(+p.arcW).toFixed(2)}, coreW: ${(+p.coreW).toFixed(2)}, pulseSpd: ${(+p.pulseSpd).toFixed(1)}, spinSpd: ${(+p.spinSpd).toFixed(1)},\n` +
    `})`;
}
function copyParams() {
  const btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(document.getElementById('copy-box').value).then(() => {
    btn.textContent = '✓ OK'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'COPIAR'; btn.classList.remove('ok'); }, 1800);
  });
}
function copySnippet() {
  const btn = document.getElementById('snippet-btn');
  const text = `const eb = new ElectricBorder(${document.getElementById('copy-box').value.replace(/^new ElectricBorder/, '')});

// dentro do loop de animação:
// eb.draw(ctx, panelX, panelY, panelW, panelH, t);`;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ OK'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'SNIPPET'; btn.classList.remove('ok'); }, 1800);
  });
}

// ── Build sliders ─────────────────────────────────────────────────────────────
const sliderEls = {};
const grid = document.getElementById('sliders-grid');
SLIDERS.forEach(def => {
  const row = document.createElement('div'); row.className = 'sl-row';
  const lbl = document.createElement('span'); lbl.className = 'sl-lbl'; lbl.textContent = def.label;
  const inp = document.createElement('input');
  inp.type = 'range'; inp.min = def.min; inp.max = def.max; inp.step = def.step;
  inp.value = def.key === 'outerHue'
    ? (eb.p.outerHue != null ? eb.p.outerHue : eb.p.hue)
    : eb.p[def.key];
  const val = document.createElement('span'); val.className = 'sl-val';
  val.textContent = def.fmt(+inp.value);
  inp.addEventListener('input', () => {
    const v = +inp.value;
    val.textContent = def.fmt(v);
    eb.setParams({ [def.key]: v });
    updateCopyBox();
    if (def.key === 'hue')
      document.querySelectorAll('.color-btn').forEach((b, i) =>
        b.classList.toggle('active', COLORS[i].hue === v));
  });
  sliderEls[def.key] = { input: inp, valEl: val, fmt: def.fmt };
  row.appendChild(lbl); row.appendChild(inp); row.appendChild(val);
  grid.appendChild(row);
});

function syncSliders() {
  SLIDERS.forEach(def => {
    const el = sliderEls[def.key];
    const v = def.key === 'outerHue'
      ? (eb.p.outerHue != null ? eb.p.outerHue : eb.p.hue)
      : eb.p[def.key];
    el.input.value = v;
    el.valEl.textContent = def.fmt(+v);
  });
  updateCopyBox();
}

// ── Preset logic ──────────────────────────────────────────────────────────────
function applyPreset(name) {
  eb.setParams(PRESETS[name]);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('p-' + name).classList.add('active');
  syncSliders();
}

// ── Color logic ───────────────────────────────────────────────────────────────
function applyColor(idx) {
  eb.setParams({ hue: COLORS[idx].hue });
  document.querySelectorAll('.color-btn').forEach((b, i) =>
    b.classList.toggle('active', i === idx)
  );
  syncSliders();
}

function applyOuterColor(idx) {
  eb.setParams({ outerHue: COLORS[idx].hue });
  document.querySelectorAll('.outer-color-btn').forEach((b, i) =>
    b.classList.toggle('active', i === idx)
  );
  syncSliders();
}

// Build color swatches dynamically
const cg = document.getElementById('color-group');
COLORS.forEach((col, i) => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (i === 0 ? ' active' : '');
  btn.title = col.name;
  btn.style.cssText = `background:${col.swatch};--sw-c:${col.swatch}`;
  btn.addEventListener('click', () => applyColor(i));
  cg.appendChild(btn);
});

// Build outer border (frame) color swatches
const ocg = document.getElementById('outer-color-group');
COLORS.forEach((col, i) => {
  const btn = document.createElement('button');
  btn.className = 'outer-color-btn color-btn' + (i === 0 ? ' active' : '');
  btn.title = col.name;
  btn.style.cssText = `background:${col.swatch};--sw-c:${col.swatch}`;
  btn.addEventListener('click', () => applyOuterColor(i));
  ocg.appendChild(btn);
});

// ── Advanced panel toggle ─────────────────────────────────────────────────────
let advOpen = false;
function toggleAdv() {
  advOpen = !advOpen;
  document.getElementById('adv-panel').classList.toggle('open', advOpen);
  document.getElementById('adv-toggle-btn').classList.toggle('open', advOpen);
  if (advOpen) syncSliders();
}
document.addEventListener('click', e => {
  if (advOpen &&
      !e.target.closest('#adv-panel') &&
      !e.target.closest('#adv-toggle-btn')) {
    advOpen = false;
    document.getElementById('adv-panel').classList.remove('open');
    document.getElementById('adv-toggle-btn').classList.remove('open');
  }
});

updateCopyBox();

// ── Helpers ───────────────────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r, y);
  cx.lineTo(x+w-r, y); cx.arcTo(x+w, y, x+w, y+r, r);
  cx.lineTo(x+w, y+h-r); cx.arcTo(x+w, y+h, x+w-r, y+h, r);
  cx.lineTo(x+r, y+h); cx.arcTo(x, y+h, x, y+h-r, r);
  cx.lineTo(x, y+r); cx.arcTo(x, y, x+r, y, r);
  cx.closePath();
}

// ── Background Grid ───────────────────────────────────────────────────────────
function drawGrid() {
  cx.save();
  cx.strokeStyle = 'rgba(80, 25, 160, 0.055)';
  cx.lineWidth = 1;
  const sp = 44;
  for (let x = sp / 2; x < W; x += sp) { cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, H); cx.stroke(); }
  for (let y = sp / 2; y < H; y += sp) { cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke(); }
  cx.restore();
}

// ── BG Glow ───────────────────────────────────────────────────────────────────
function drawBgGlow(t) {
  if (!T.bg) return;
  const h  = eb.p.hue;
  const p1 = 0.68 + 0.32 * Math.sin(t * 1.1);
  const p2 = 0.72 + 0.28 * Math.sin(t * 1.8 + 1.0);

  // Wide ambient bloom
  cx.save();
  cx.filter = 'blur(60px)';
  const g1 = cx.createRadialGradient(CX, CY, 0, CX, CY, 420);
  g1.addColorStop(0,    `hsla(${h},80%,52%,${(0.62 * p1).toFixed(3)})`);
  g1.addColorStop(0.38, `hsla(${h},70%,38%,${(0.26 * p1).toFixed(3)})`);
  g1.addColorStop(0.72, `hsla(${h},60%,26%,${(0.09 * p1).toFixed(3)})`);
  g1.addColorStop(1,    `hsla(${h},50%,14%,0)`);
  cx.fillStyle = g1;
  cx.fillRect(CX - 540, CY - 440, 1080, 880);
  cx.restore();

  // Tight border bloom — hammadxcm "background-glow" style
  cx.save();
  cx.filter = 'blur(30px)';
  cx.globalAlpha = 0.48 * p2;
  const g2 = cx.createLinearGradient(PX, PY, PX + PW, PY + PH);
  g2.addColorStop(0,   `hsla(${h},78%,58%,0.7)`);
  g2.addColorStop(0.5, `hsla(${h},60%,30%,0.08)`);
  g2.addColorStop(1,   `hsla(${h},78%,58%,0.7)`);
  cx.fillStyle = g2;
  rr(PX - 24, PY - 24, PW + 48, PH + 48, 18);
  cx.fill();
  cx.restore();
}

// ── Corner Highlights — hammadxcm overlay-1/overlay-2 ────────────────────────
function drawCornerHighlights() {
  if (!T.cn) return;
  cx.save();
  cx.filter = 'blur(24px)';
  cx.globalCompositeOperation = 'overlay';
  cx.globalAlpha = 0.28;
  const g = cx.createLinearGradient(PX, PY, PX + PW, PY + PH);
  g.addColorStop(0,    'rgba(255,255,255,0.7)');
  g.addColorStop(0.24, 'rgba(255,255,255,0)');
  g.addColorStop(0.76, 'rgba(255,255,255,0)');
  g.addColorStop(1,    'rgba(255,255,255,0.7)');
  cx.fillStyle = g;
  rr(PX - 14, PY - 14, PW + 28, PH + 28, 16);
  cx.fill();
  cx.restore();
}

// ── Panel Fill ────────────────────────────────────────────────────────────────
function drawPanelFill() {
  cx.save();
  const g = cx.createLinearGradient(PX, PY, PX, PY + PH);
  g.addColorStop(0, 'rgba(10,4,24,0.97)');
  g.addColorStop(1, 'rgba(5,2,14,0.97)');
  cx.fillStyle = g;
  rr(PX, PY, PW, PH, 14);
  cx.fill();
  cx.restore();
}

// ── Panel Content ─────────────────────────────────────────────────────────────
function drawContent(t) {
  const h = eb.p.hue;
  cx.save();
  cx.textAlign = 'center';

  // ── Title
  cx.textBaseline = 'top';
  cx.font = '52px "Black Ops One", cursive';
  cx.fillStyle = '#ffffff';
  cx.shadowColor = `hsla(${h},80%,65%,0.95)`;
  cx.shadowBlur  = 26;
  cx.fillText('GAME OVER', CX, PY + 38);

  // ── Divider 1
  cx.shadowBlur = 0;
  cx.strokeStyle = `hsla(${h},55%,55%,0.28)`;
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(PX + 52, PY + 106); cx.lineTo(PX + PW - 52, PY + 106);
  cx.stroke();

  // ── Stat labels
  const lp = 0.80 + 0.20 * Math.sin(t * 2.0);
  cx.font = '500 13px "Rajdhani", sans-serif';
  cx.fillStyle = `hsla(${h},55%,75%,${(0.52 * lp).toFixed(3)})`;
  cx.textBaseline = 'top';
  cx.fillText('PONTOS', CX - 100, PY + 122);
  cx.fillText('WAVE',   CX + 100, PY + 122);

  // ── Stat values
  cx.font = '700 36px "Orbitron", sans-serif';
  cx.fillStyle   = `hsla(${h},70%,78%,1)`;
  cx.shadowColor = `hsla(${h},75%,68%,0.9)`;
  cx.shadowBlur  = 18;
  cx.fillText('47,820', CX - 100, PY + 143);
  cx.fillText('12',     CX + 100, PY + 143);

  // ── Divider 2
  cx.shadowBlur = 0;
  cx.strokeStyle = `hsla(${h},55%,55%,0.14)`;
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(PX + 52, PY + 204); cx.lineTo(PX + PW - 52, PY + 204);
  cx.stroke();

  // ── Buttons
  const bw = 168, bh = 44, gap = 20;
  const b1x = CX - gap / 2 - bw, bly = PY + 228;
  const b2x = CX + gap / 2;

  // Restart (primary)
  const bg1 = cx.createLinearGradient(b1x, bly, b1x, bly + bh);
  bg1.addColorStop(0, `hsla(${h},65%,44%,0.5)`);
  bg1.addColorStop(1, `hsla(${h},60%,32%,0.38)`);
  cx.fillStyle = bg1;
  rr(b1x, bly, bw, bh, 9); cx.fill();
  cx.strokeStyle = `hsla(${h},70%,62%,0.7)`;
  cx.lineWidth = 1;
  rr(b1x, bly, bw, bh, 9); cx.stroke();

  // Menu (secondary)
  cx.fillStyle = 'rgba(28,12,52,0.58)';
  rr(b2x, bly, bw, bh, 9); cx.fill();
  cx.strokeStyle = `hsla(${h},55%,50%,0.22)`;
  rr(b2x, bly, bw, bh, 9); cx.stroke();

  // Button labels
  cx.textBaseline = 'middle';
  cx.font = '700 13px "Orbitron", sans-serif';
  cx.fillStyle   = `hsla(${h},75%,78%,1)`;
  cx.shadowColor = `hsla(${h},75%,68%,0.9)`;
  cx.shadowBlur  = 10;
  cx.fillText('RESTART', b1x + bw / 2, bly + bh / 2);
  cx.fillStyle = `hsla(${h},50%,65%,0.6)`;
  cx.shadowBlur = 0;
  cx.fillText('MENU', b2x + bw / 2, bly + bh / 2);

  // Footer hint
  cx.font = '400 11px "Rajdhani", sans-serif';
  cx.fillStyle = `hsla(${h},45%,55%,0.28)`;
  cx.textBaseline = 'bottom';
  cx.fillText('ENTER PARA REINICIAR  ·  ESC PARA MENU', CX, PY + PH - 16);

  cx.restore();
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  const t = ts / 1000;
  cx.clearRect(0, 0, W, H);

  drawGrid();
  drawBgGlow(t);
  drawPanelFill();
  drawCornerHighlights();
  drawContent(t);
  eb.draw(cx, PX, PY, PW, PH, t, { outer: T.ou, aura: T.au, electric: T.el });

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
